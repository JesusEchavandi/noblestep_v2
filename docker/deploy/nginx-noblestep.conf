# ============================================
# NobleStep - Nginx Config (solo IP + puertos)
# IP: 104.131.62.116
# Admin:     http://104.131.62.116:3000
# Ecommerce: http://104.131.62.116:3001
# API:       http://104.131.62.116:5000  (.NET escucha directo, sin Nginx)
# ============================================

# Admin Panel - Puerto 3000
server {
    listen 3000;
    server_name 104.131.62.116;

    root /var/www/noblestep-admin;
    index index.html;

    # Soporte para Angular Router (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}

# Ecommerce - Puerto 3001
server {
    listen 3001;
    server_name 104.131.62.116;

    root /var/www/noblestep-ecommerce;
    index index.html;

    # Soporte para Angular Router (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
