# ============================================
# NobleStep - Nginx Config con TLS (Let's Encrypt)
# Requiere: dominio apuntando a la IP del VPS
# Reemplazar DOMINIO.COM por tu dominio real
# ============================================

# --- Redirigir HTTP → HTTPS ---
server {
    listen 80;
    server_name DOMINIO.COM www.DOMINIO.COM admin.DOMINIO.COM api.DOMINIO.COM;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Ecommerce (tienda pública) ---
server {
    listen 443 ssl http2;
    server_name DOMINIO.COM www.DOMINIO.COM;

    ssl_certificate /etc/letsencrypt/live/DOMINIO.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMINIO.COM/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/noblestep-ecommerce;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Angular Router (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy al API .NET
    location /api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout para operaciones largas
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Cache para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}

